name: Build & push detectron2 CUDA base image

on:
  workflow_run:
    workflows: ["Build CUDA Wheel"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      wheel-run-id:
        description: "Run ID of the 'Build CUDA Wheel' workflow that produced the artifact"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: futuredial-emea/detectron2-base

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve wheel run ID
        id: wheel-run
        run: |
          if [ -n "${{ inputs.wheel-run-id }}" ]; then
            echo "id=${{ inputs.wheel-run-id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download detectron2 CUDA wheel
        uses: actions/download-artifact@v4
        with:
          name: detectron2-cuda-wheel
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.wheel-run.outputs.id }}
          path: dist/

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/Dockerfile.base-cuda
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda
          cache-from: type=gha,scope=cuda
          cache-to: type=gha,mode=max,scope=cuda
