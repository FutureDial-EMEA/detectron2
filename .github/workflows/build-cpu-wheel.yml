name: Build CPU Wheel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-cpu-wheel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            libglib2.0-0 \
            libsm6 \
            libxrender1 \
            libxext6

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install CPU-only PyTorch and torchvision
        run: |
          pip install \
            "torch>=2.0.0" \
            "torchvision>=0.15.0" \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining compatible dependencies
        run: |
          pip install \
            "numpy>=1.24.0" \
            "Pillow>=10.0.0" \
            "opencv-python-headless>=4.8.0" \
            "pycocotools>=2.0.2"

      - name: Build CPU wheel
        env:
          FORCE_CUDA: "0"
        run: |
          python setup.py bdist_wheel 2>&1 | tee build.log

      - name: Verify wheel was created
        run: |
          ls -lh dist/
          python -m wheel tags --python-tag cp$(python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')") dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: detectron2-cpu-wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30

      - name: Smoke test wheel install
        run: |
          pip install dist/*.whl --no-deps
          python -c "import detectron2; print('detectron2', detectron2.__version__, 'imported OK')"
